<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <!-- SEO meta tags are managed by react-helmet-async in src/components/SEO.tsx -->
    <!-- Fallback title for crawlers that don't execute JS -->
    <title>Djamel Eddine Khelifaoui — Software Engineer &amp; AI Researcher</title>
    <meta name="description" content="Portfolio of Djamel Eddine Khelifaoui — Software Engineer, AI Researcher, and PhD Candidate specializing in scalable backend systems, mobile applications, and machine learning for IoT security." />
    <link rel="canonical" href="https://djamelkhelifaoui.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // FOIUC prevention — apply theme before first paint
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
