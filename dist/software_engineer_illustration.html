<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Software Engineer Illustration — Dark Theme</title>
<style>
  /* ============================================================
     These mirror the CSS variables from the portfolio's theme.
     If this file is embedded inside a page that already defines
     --background, --primary, --accent, etc., these fallback
     values are simply ignored and the site's own theme is used.
     ============================================================ */
  :root {
    /* Light mode palette */
    --background: 210 40% 98%;
    --foreground: 222 47% 11%;

    --card: 0 0% 100%;
    --card-foreground: 222 47% 11%;
    --card-border: 214 32% 91%;

    --primary: 217 91% 53%;
    --primary-foreground: 0 0% 100%;

    --secondary: 210 40% 96%;
    --secondary-foreground: 222 47% 11%;

    --muted: 210 40% 96%;
    --muted-foreground: 215 16% 47%;

    --accent: 142 71% 36%;
    --accent-foreground: 0 0% 100%;

    --destructive: 0 84% 60%;
    --destructive-foreground: 0 0% 100%;

    --border: 214 32% 91%;

    --code-number: 38 92% 45%;

    --app-font-mono: 'Fira Code', Consolas, Menlo, monospace;
  }

  .dark {
    --background: 223 47% 8%;
    --foreground: 210 40% 98%;

    --card: 221 39% 11%;
    --card-foreground: 210 40% 98%;
    --card-border: 215 28% 17%;

    --primary: 217 91% 60%;
    --primary-foreground: 210 40% 98%;

    --secondary: 215 32% 17%;
    --secondary-foreground: 210 40% 98%;

    --muted: 223 47% 12%;
    --muted-foreground: 215 16% 65%;

    --accent: 142 71% 45%;
    --accent-foreground: 210 40% 98%;

    --destructive: 0 84% 60%;
    --destructive-foreground: 210 40% 98%;

    --border: 215 28% 17%;

    --code-number: 38 92% 65%;

    --app-font-mono: 'Fira Code', Consolas, Menlo, monospace;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  .illustration-wrap {
    width: 100%;
    max-width: 690px;
    margin: 0 auto;
    background: transparent;
  }
  .illustration-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ---------- code overlay ---------- */
  .code-box {
    font-family: var(--app-font-mono);
    font-size: 8px;                 /* reduced from 9px to prevent overflow */
    line-height: 11px;
    color: hsl(var(--foreground));
    white-space: pre;
    padding: 8px 8px 0 8px;         /* added right padding */
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .code-box .kw   { color: hsl(var(--primary)); }
  .code-box .type { color: hsl(var(--accent)); }
  .code-box .num  { color: hsl(var(--code-number)); }
  .code-box .cmt  { color: hsl(var(--muted-foreground)); font-style: italic; }
  .code-box .cursor {
    display: inline-block;
    width: 6px;
    background: hsl(var(--primary));
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ---------- ambient background blobs ---------- */
  .glow-blob {
    animation: blobFloat 10s ease-in-out infinite;
  }
  .glow-blob.b2 { animation-delay: -3s; animation-duration: 12s; }
  .glow-blob.b3 { animation-delay: -6s; animation-duration: 8s; }
  @keyframes blobFloat {
    0%   { transform: translate(0, 0);      opacity: 0.5; }
    50%  { transform: translate(6px, -10px); opacity: 0.85; }
    100% { transform: translate(0, 0);      opacity: 0.5; }
  }

  /* ---------- screen glow pulse ---------- */
  .screen-glow {
    animation: glowPulse 4s ease-in-out infinite;
    transform-origin: 340px 215px;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.10; }
    50%      { opacity: 0.22; }
  }

  /* ---------- power LED ---------- */
  .power-led {
    animation: ledBlink 2.4s ease-in-out infinite;
  }
  @keyframes ledBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* ---------- gears ---------- */
  .gear-large {
    transform-origin: 566px 130px;
    animation: spin 18s linear infinite;
  }
  .gear-small {
    transform-origin: 592px 158px;
    animation: spinReverse 12s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinReverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  /* ---------- cloud drift ---------- */
  .cloud-group {
    animation: cloudDrift 7s ease-in-out infinite alternate;
  }
  @keyframes cloudDrift {
    from { transform: translateX(0); }
    to   { transform: translateX(10px); }
  }


  /* ---------- coffee steam ---------- */
  .steam {
    animation: steamRise 3s ease-in-out infinite;
  }
  .steam.s2 { animation-delay: -1s; }
  @keyframes steamRise {
    0%   { transform: translateY(0);   opacity: 0; }
    30%  { opacity: 0.6; }
    100% { transform: translateY(-14px); opacity: 0; }
  }

  /* ---------- git branch commit pulses ---------- */
  .branch-dot {
    animation: dotPulse 2.2s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: center;
  }
  .branch-dot.d2 { animation-delay: -0.5s; }
  .branch-dot.d3 { animation-delay: -1s; }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.6; }
  }

  /* ---------- floating </> icon ---------- */
  .code-icon {
    animation: iconFloat 3.2s ease-in-out infinite alternate;
  }
  @keyframes iconFloat {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }

  /* ---------- terminal prompt blink ---------- */
  .terminal-prompt {
    animation: blink 1.1s steps(1) infinite;
  }

  /* ---------- drifting data particles ---------- */
  .data-particle {
    animation: particleDrift 6s linear infinite;
  }
  .data-particle.p2 { animation-delay: -2s; }
  .data-particle.p3 { animation-delay: -4s; }
  @keyframes particleDrift {
    0%   { transform: translate(0, 0);       opacity: 0; }
    15%  { opacity: 0.8; }
    85%  { opacity: 0.8; }
    100% { transform: translate(-46px, 44px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="illustration-wrap">
<svg width="100%" viewBox="0 0 690 490" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Animated illustration of a software engineer's desk with a Java method typing on the monitor</title>
<desc>A dark-theme illustration matching a developer portfolio, showing a laptop with a typewriter-animated Java method on screen, surrounded by floating tech icons: brackets, a terminal, gears, a cloud, and a git branch, with a coffee cup on the desk.</desc>

<defs>
  <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <filter id="tinyBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.2"/>
  </filter>
  <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1.2" cy="1.2" r="1.2" fill="hsl(var(--border))" opacity="0.5"/>
  </pattern>
  <linearGradient id="deskGradient" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="hsl(var(--card))"/>
    <stop offset="100%" stop-color="hsl(var(--background))"/>
  </linearGradient>
</defs>

<!-- ambient glow blobs -->
<circle class="glow-blob b1" cx="90" cy="80" r="46" fill="hsl(var(--primary))" opacity="0.5" filter="url(#softBlur)"/>
<circle class="glow-blob b2" cx="600" cy="70" r="30" fill="hsl(var(--accent))" opacity="0.4" filter="url(#softBlur)"/>
<circle class="glow-blob b3" cx="630" cy="100" r="20" fill="hsl(var(--primary))" opacity="0.3" filter="url(#softBlur)"/>

<!-- desk -->
<rect x="60" y="400" width="560" height="24" rx="4" fill="url(#deskGradient)" stroke="hsl(var(--card-border))" stroke-width="1"/>
<rect x="60" y="424" width="560" height="10" fill="hsl(var(--background))"/>
<rect x="60" y="400" width="560" height="2" fill="hsl(var(--primary))" opacity="0.18"/>

<!-- laptop glow -->
<rect class="screen-glow" x="195" y="110" width="290" height="210" rx="20" fill="hsl(var(--primary))" filter="url(#softBlur)"/>

<!-- laptop / monitor -->
<rect x="205" y="120" width="270" height="190" rx="10" fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1.5"/>
<rect x="220" y="135" width="240" height="150" rx="4" fill="hsl(var(--background))"/>
<rect x="320" y="310" width="40" height="34" fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1"/>
<rect x="280" y="344" width="120" height="12" rx="4" fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1"/>
<circle class="power-led" cx="340" cy="303" r="2.4" fill="hsl(var(--accent))"/>

<!-- code typing on screen -->
<foreignObject x="222" y="138" width="236" height="144">
  <div xmlns="http://www.w3.org/1999/xhtml" class="code-box" id="codeBox"></div>
</foreignObject>

<!-- drifting data particles above the laptop -->
<circle class="data-particle p1" cx="470" cy="115" r="2.5" fill="hsl(var(--primary))"/>
<circle class="data-particle p2" cx="490" cy="120" r="2" fill="hsl(var(--accent))"/>
<circle class="data-particle p3" cx="505" cy="112" r="2" fill="hsl(var(--primary))"/>

<!-- </> floating icon -->
<g class="code-icon">
<text x="120" y="215" font-size="34" font-weight="700" fill="hsl(var(--primary))" font-family="var(--app-font-mono), monospace">&lt;/&gt;</text>
</g>

<!-- terminal icon -->
<g>
<rect x="100" y="270" width="70" height="46" rx="6" fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1"/>
<text class="terminal-prompt" x="112" y="299" font-size="16" fill="hsl(var(--accent))" font-family="var(--app-font-mono), monospace">&gt;_</text>
</g>

<!-- cloud icon -->
<g class="cloud-group">
  <!-- cleaner, more accurate cloud silhouette -->
  <path d="M 442 100
           C 442 88, 450 82, 460 82
           C 465 72, 475 72, 480 82
           C 485 72, 495 72, 500 82
           C 510 82, 518 88, 518 100
           C 518 110, 510 118, 500 118
           L 460 118
           C 450 118, 442 110, 442 100 Z"
        fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1"/>
  <line x1="472" y1="120" x2="472" y2="130" stroke="hsl(var(--primary))" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="480" y1="120" x2="480" y2="134" stroke="hsl(var(--primary))" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="488" y1="120" x2="488" y2="130" stroke="hsl(var(--primary))" stroke-width="2.5" stroke-linecap="round"/>
</g>


<!-- coffee cup -->
<g>
<path class="steam s1" d="M508 318 q-4 -8 0 -16" stroke="hsl(var(--muted-foreground))" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"/>
<path class="steam s2" d="M524 318 q4 -8 0 -16" stroke="hsl(var(--muted-foreground))" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0"/>
<rect x="500" y="330" width="40" height="46" rx="4" fill="hsl(var(--card))" stroke="hsl(var(--card-border))" stroke-width="1"/>
<path d="M540 340 q16 0 16 14 t-16 14" stroke="hsl(var(--card-border))" stroke-width="5" fill="none"/>
</g>

<!-- git branch -->
<g>
<circle class="branch-dot d1" cx="70" cy="170" r="4" fill="hsl(var(--primary))"/>
<circle class="branch-dot d2" cx="70" cy="185" r="4" fill="hsl(var(--primary))"/>
<circle class="branch-dot d3" cx="90" cy="200" r="4" fill="hsl(var(--accent))"/>
<path d="M70 170 L70 185 L90 200" stroke="hsl(var(--muted-foreground))" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- gear (large) -->
<g class="gear-large" fill="hsl(var(--secondary))" stroke="hsl(var(--card-border))" stroke-width="1">
<circle cx="566" cy="130" r="20"/>
<rect x="562" y="102" width="8" height="10"/>
<rect x="562" y="148" width="8" height="10"/>
<rect x="538" y="126" width="10" height="8"/>
<rect x="584" y="126" width="10" height="8"/>
<rect x="546" y="110" width="9" height="9" transform="rotate(45 550 114)"/>
<rect x="577" y="110" width="9" height="9" transform="rotate(-45 581 114)"/>
<rect x="546" y="142" width="9" height="9" transform="rotate(-45 550 146)"/>
<rect x="577" y="142" width="9" height="9" transform="rotate(45 581 146)"/>
</g>
<circle cx="566" cy="130" r="9" fill="hsl(var(--background))"/>

<!-- gear (small) — now with matching teeth -->
<g class="gear-small" fill="hsl(var(--primary))" stroke="hsl(var(--card-border))" stroke-width="1">
  <circle cx="592" cy="158" r="13"/>
  <!-- cardinal teeth -->
  <rect x="589" y="140" width="6" height="6"/>
  <rect x="589" y="170" width="6" height="6"/>
  <rect x="574" y="155" width="6" height="6"/>
  <rect x="604" y="155" width="6" height="6"/>
  <!-- diagonal teeth -->
  <rect x="578" y="144" width="6" height="6" transform="rotate(45 581 147)"/>
  <rect x="600" y="144" width="6" height="6" transform="rotate(-45 603 147)"/>
  <rect x="578" y="166" width="6" height="6" transform="rotate(-45 581 169)"/>
  <rect x="600" y="166" width="6" height="6" transform="rotate(45 603 169)"/>
</g>
<circle cx="592" cy="158" r="6" fill="hsl(var(--background))"/>

</svg>
</div>

<script>
(function () {
  var rawLines = [
    "/**",
    " * Checks if a string is a palindrome.",
    " */",
    "public static boolean isPalindrome(String s) {",
    "    int left = 0, right = s.length() - 1;",
    "    while (left < right) {",
    "        if (s.charAt(left++) != s.charAt(right--)) {",
    "            return false;",
    "        }",
    "    }",
    "    return true;",
    "}"
  ];
  var fullText = rawLines.join("\n");

  var keywords = ["public","static","if","while","return","true","false","new","final","class"];
  var types = ["boolean","int","String","void"];

  function highlight(text) {
    text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // block comments first (only colored once fully typed)
    text = text.replace(/\/\*\*[\s\S]*?\*\//g, function (m) {
      return '<span class="cmt">' + m + '</span>';
    });

    // numbers
    text = text.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');

    // types
    var typePattern = new RegExp("\b(" + types.join("|") + ")\b", "g");
    text = text.replace(typePattern, '<span class="type">$1</span>');

    // keywords
    var kwPattern = new RegExp("\b(" + keywords.join("|") + ")\b", "g");
    text = text.replace(kwPattern, '<span class="kw">$1</span>');

    return text;
  }

  var box = document.getElementById("codeBox");
  var i = 0;
  var typingSpeed = 26;
  var pauseAtEnd = 1800;
  var pauseAtStart = 500;

  function tick() {
    if (i <= fullText.length) {
      var current = fullText.slice(0, i);
      box.innerHTML = highlight(current) + '<span class="cursor">&nbsp;</span>';
      i++;
      setTimeout(tick, typingSpeed);
    } else {
      setTimeout(function () {
        i = 0;
        box.innerHTML = '<span class="cursor">&nbsp;</span>';
        setTimeout(tick, pauseAtStart);
      }, pauseAtEnd);
    }
  }

  tick();
})();

// Listen for theme changes from parent page
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'theme-change') {
    if (event.data.theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }
});
</script>

</body>
</html>
